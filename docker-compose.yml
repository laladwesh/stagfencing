services:
  app:
    build:
      context: .
      args:
        REACT_APP_GOOGLE_CLIENT_ID: ${REACT_APP_GOOGLE_CLIENT_ID}
        REACT_APP_STRIPE_PUBLISHABLE_KEY: ${REACT_APP_STRIPE_PUBLISHABLE_KEY}
    image: stagfencing-app
    container_name: stagfencing-app
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
